version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: thesis
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thesis -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: rady005/sala-digital-app:${APP_VERSION:-1.0}
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: thesis
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}
      SERVER_PORT: ${APP_PORT:-8282}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: